<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Migração</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0d0d0f;
    color: #e4e4e7;
    font-size: 13px;
}

.header {
    background: #111;
    padding: 14px;
    text-align: center;
    border-bottom: 1px solid #222;
}

.container {
    padding: 15px;
    max-width: 1500px;
    margin: auto;
}

input {
    padding: 6px;
    margin: 3px;
    border-radius: 5px;
    border: 1px solid #2a2a2e;
    background: #111;
    color: #fff;
    font-size: 11px;
}

.small {
    font-size: 10px;
    color: #777;
}

button {
    padding: 4px 6px;
    font-size: 10px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    background: transparent;
    color: #aaa;
}

button.primary {
    background: #ff6b00;
    color: white;
}

.grid {
    display: flex;
    gap: 8px;
}

.coluna {
    flex: 1;
    background: #111;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #222;
    min-height: 300px;
}

.card {
    background: #151517;
    padding: 6px;
    border-radius: 6px;
    margin-top: 5px;
    border: 1px solid #222;
    cursor: grab;
}

.group {
    margin-top: 10px;
    font-size: 11px;
    color: #888;
    cursor: pointer;
}

.subgroup {
    margin-left: 10px;
    font-size: 11px;
    color: #aaa;
    cursor: pointer;
}

a.link {
    color: #ff6b00;
    font-size: 10px;
    text-decoration: none;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">Controle de Migração</div>

<!-- MAIN -->
<div class="container" id="main">

<input id="id" placeholder="ID">
<input id="cliente" placeholder="Cliente">
<input id="onboarder" placeholder="@nome ou @telefone">
<input id="linkSF" placeholder="Link SF">
<input id="entrada" type="date">
<input id="entrega" type="date">
<input id="produtos" placeholder="Qtd produtos">

<button class="primary" onclick="add()">Adicionar</button>

<div class="grid">
    <div class="coluna" ondragover="allowDrop(event)" ondrop="drop(event,'afazer')">
        <h3>A fazer</h3><div id="afazer"></div>
    </div>

    <div class="coluna" ondragover="allowDrop(event)" ondrop="drop(event,'andamento')">
        <h3>Andamento</h3><div id="andamento"></div>
    </div>

    <div class="coluna" ondragover="allowDrop(event)" ondrop="drop(event,'finalizado')">
        <h3>Finalizado</h3><div id="finalizado"></div>
    </div>

    <div class="coluna">
        <h3>Antigos</h3><div id="antigo"></div>
    </div>
</div>

</div>

<!-- PRODUTOS -->
<div class="container hidden" id="produtosPage">

<button onclick="voltar()">← Voltar</button>
<h3 id="tituloProdutos"></h3>

<input id="nomeProduto" placeholder="Nome produto">
<input id="idProduto" placeholder="ID produto">

<button onclick="addProduto()">Adicionar</button>

<div id="listaProdutos"></div>

</div>

<script>
let dados = JSON.parse(localStorage.getItem("migracoes")) || [];
let estadoUI = JSON.parse(localStorage.getItem("uiState")) || {};
let clienteAtual = null;
let draggedIndex = null;

/* ===== BASICO ===== */

function salvar(){ localStorage.setItem("migracoes", JSON.stringify(dados)); }
function salvarUI(){ localStorage.setItem("uiState", JSON.stringify(estadoUI)); }

function add(){
    if(!id.value || !cliente.value || !onboarder.value || !linkSF.value){
        alert("Preencha o básico");
        return;
    }

    if(!onboarder.value.startsWith("@")){
        alert("Onboarder precisa começar com @");
        return;
    }

    dados.push({
        id: id.value,
        cliente: cliente.value,
        onboarder: onboarder.value,
        linkSF: linkSF.value,
        entrada: entrada.value,
        entrega: entrega.value,
        produtosQtd: produtos.value,
        produtosLista: [],
        status: "afazer"
    });

    salvar();
    render();
}

/* ===== DRAG ===== */

function drag(event,i){
    draggedIndex = i;
}

function allowDrop(e){
    e.preventDefault();
}

function drop(e,status){
    e.preventDefault();

    if(draggedIndex !== null){
        let item = dados[draggedIndex];
        item.status = status;

        if(status === "finalizado"){
            item.mensagem = `🚨 Migração finalizada
Onboarder: ${item.onboarder}
Link: ${item.linkSF}`;
        }

        salvar();
        render();
    }
}

/* ===== PRODUTOS ===== */

function abrirProdutos(i){
    clienteAtual = i;
    main.classList.add("hidden");
    produtosPage.classList.remove("hidden");
    tituloProdutos.innerText = dados[i].cliente;
    renderProdutos();
}

function voltar(){
    main.classList.remove("hidden");
    produtosPage.classList.add("hidden");
}

function addProduto(){
    if(!nomeProduto.value || !idProduto.value) return;

    dados[clienteAtual].produtosLista.push({
        nome: nomeProduto.value,
        id: idProduto.value,
        status: ""
    });

    nomeProduto.value="";
    idProduto.value="";

    salvar();
    renderProdutos();
}

function atualizarStatus(i){
    dados[clienteAtual].produtosLista[i].status =
        document.getElementById("statusProd"+i).value;
    salvar();
}

function renderProdutos(){
    listaProdutos.innerHTML="";

    dados[clienteAtual].produtosLista.forEach((p,i)=>{
        listaProdutos.innerHTML += `
        <div class="card">
            <b>${p.nome}</b><br>
            ID: ${p.id}<br>

            <input 
                id="statusProd${i}" 
                value="${p.status || ""}" 
                placeholder="Crawler / Pronto..."
                oninput="atualizarStatus(${i})"
            >
        </div>
        `;
    });
}

/* ===== RENDER ===== */

function formatarData(d){
    if(!d) return "";
    let p=d.split("-");
    return `${p[2]}/${p[1]}`;
}

function render(){
    afazer.innerHTML="";
    andamento.innerHTML="";
    finalizado.innerHTML="";
    antigo.innerHTML="";

    let grupos={};

    dados.forEach((item,i)=>{

        let info = `
        <div class="small">
            ${item.entrada ? `E: ${formatarData(item.entrada)}`:""}
            ${item.entrega ? ` | S: ${formatarData(item.entrega)}`:""}
            ${item.produtosQtd ? ` | ${item.produtosQtd}p`:""}
        </div>`;

        let card = `
        <div class="card" draggable="true" ondragstart="drag(event, ${i})">
            <b>${item.cliente}</b><br>
            ${item.id}<br>
            <a href="${item.linkSF}" target="_blank" class="link">Abrir Link</a>
            ${info}

            <div>
                <button onclick="abrirProdutos(${i})">Produtos</button>
            </div>
        </div>
        `;

        if(item.status==="antigo"){
            if(!grupos[item.mes]) grupos[item.mes]={};
            if(!grupos[item.mes][item.data]) grupos[item.mes][item.data]=[];
            grupos[item.mes][item.data].push(card);
        } else {
            document.getElementById(item.status).innerHTML += card;
        }
    });

    for(let mes in grupos){
        antigo.innerHTML += `<div class="group">${mes}</div>`;
        for(let data in grupos[mes]){
            antigo.innerHTML += `<div class="subgroup">${data}</div>`;
            grupos[mes][data].forEach(c=>antigo.innerHTML+=c);
        }
    }
}

render();
</script>

</body>
</html>
