<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Migração</title>

<style>
:root {
    --bg: #0d0d0f;
    --card: #151517;
    --box: #111;
    --text: #ffffff;
    --sub: #888;
    --border: #222;
    --accent: #ff6b00;
}

.light {
    --bg: #f5f5f5;
    --card: #ffffff;
    --box: #ffffff;
    --text: #111;
    --sub: #666;
    --border: #ddd;
}

body {
    margin: 0;
    font-family: 'Segoe UI';
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
}

.header {
    background: var(--box);
    padding: 12px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
}

.container { padding: 15px; max-width: 1500px; margin:auto; }

input, textarea {
    width: 100%;
    margin: 3px;
    padding: 6px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--box);
    color: var(--text);
    font-size: 11px;
}

button {
    font-size: 10px;
    padding: 4px 6px;
    border-radius: 5px;
    background: transparent;
    color: var(--sub);
    border: none;
    cursor: pointer;
}

button.primary {
    background: var(--accent);
    color: white;
}

.grid { display:flex; gap:8px; }

.coluna {
    flex:1;
    background: var(--box);
    padding:8px;
    border-radius:8px;
    border:1px solid var(--border);
    min-height:300px;
}

.card {
    background: var(--card);
    padding:6px;
    border-radius:6px;
    margin-top:5px;
    border:1px solid var(--border);
    cursor:grab;
}

.small { font-size:10px; color:var(--sub); }

.group { margin-top:10px; color:var(--sub); }
.subgroup { margin-left:10px; color:var(--sub); }

a { color:var(--accent); font-size:10px; }

.prodBox {
    margin-top:6px;
    padding:5px;
    border:1px solid var(--border);
    border-radius:5px;
}

.criado { background:#0f1f0f; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="header">
    <b>Controle de Migração</b>
    <button onclick="toggleTheme()">🌙/☀️</button>
</div>

<div class="container">

<input id="id" placeholder="ID">
<input id="cliente" placeholder="Cliente">
<input id="onboarder" placeholder="@nome ou telefone">
<input id="linkSF" placeholder="Link SF">

<button class="primary" onclick="add()">Adicionar</button>

<div class="grid">

<div class="coluna" ondrop="drop(event,'afazer')" ondragover="allowDrop(event)">
<h3>A fazer</h3><div id="afazer"></div></div>

<div class="coluna" ondrop="drop(event,'andamento')" ondragover="allowDrop(event)">
<h3>Andamento</h3><div id="andamento"></div></div>

<div class="coluna" ondrop="drop(event,'finalizado')" ondragover="allowDrop(event)">
<h3>Finalizado</h3><div id="finalizado"></div></div>

<div class="coluna" ondrop="drop(event,'antigo')" ondragover="allowDrop(event)">
<h3>Antigos</h3><div id="antigo"></div></div>

</div>
</div>

<script>
let dados = JSON.parse(localStorage.getItem("migracoes")) || [];
let draggedIndex = null;

function salvar(){ localStorage.setItem("migracoes", JSON.stringify(dados)); }

/* ===== THEME ===== */
function toggleTheme(){
    document.body.classList.toggle("light");
}

/* ===== ADD ===== */
function add(){
    if(!id.value || !cliente.value || !onboarder.value || !linkSF.value){
        alert("Preencha tudo"); return;
    }

    dados.push({
        id:id.value,
        cliente:cliente.value,
        onboarder:onboarder.value,
        linkSF:linkSF.value,
        status:"afazer",
        produtosLista:[],
        produtosAberto:false
    });

    salvar(); render();
}

/* ===== DELETE CARD (NOVO) ===== */
function deletarCard(i){
    if(confirm("Excluir esse cliente?")){
        dados.splice(i,1);
        salvar();
        render();
    }
}

/* ===== DRAG ===== */
function drag(e,i){ draggedIndex=i; }
function allowDrop(e){ e.preventDefault(); }

function drop(e,status){
    e.preventDefault();

    let item = dados[draggedIndex];
    item.status = status;

    if(status==="finalizado"){
        item.mensagem =
`🚨 [Waiting for Conference: ${item.cliente} | ID ${item.id}
Onboarder: ${item.onboarder}
Descrição: Migração finalizada! Aguardando Conferência.
Link da task no SF: ${item.linkSF}`;

        item.mensagemEditada = item.mensagem;
    }

    if(status==="antigo"){
        let d = new Date();
        item.data = d.toLocaleDateString("pt-BR");
        item.mes = d.toLocaleString("pt-BR",{month:'long',year:'numeric'});
    }

    salvar(); render();
}

/* ===== WHATS ===== */
function enviarWhats(msg,onb){
    let num = onb.replace(/\D/g,"");
    let url = num.length>8
        ? `https://wa.me/55${num}?text=${encodeURIComponent(msg)}`
        : `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url,"_blank");
}

/* ===== PRODUTOS ===== */
function toggleProdutos(i){
    dados[i].produtosAberto=!dados[i].produtosAberto;
    salvar(); render();
}

function addProduto(i){
    let nome=prompt("Nome produto");
    let id=prompt("ID produto");
    if(!nome||!id)return;

    dados[i].produtosLista.push({nome,id,status:""});
    salvar(); render();
}

function atualizarStatusProduto(i,p){
    dados[i].produtosLista[p].status =
        document.getElementById(`prod_${i}_${p}`).value;
    salvar();
}

function deletarProduto(i,p){
    if(confirm("Excluir produto?")){
        dados[i].produtosLista.splice(p,1);
        salvar(); render();
    }
}

/* ===== RENDER ===== */
function render(){
    afazer.innerHTML="";
    andamento.innerHTML="";
    finalizado.innerHTML="";
    antigo.innerHTML="";

    let grupos={};

    dados.forEach((item,i)=>{

        let card=`
        <div class="card" draggable="true" ondragstart="drag(event,${i})">
            <b>${item.cliente}</b><br>
            ${item.id}<br>
            <a href="${item.linkSF}" target="_blank">Abrir Link</a>

            <div>
                <button onclick="toggleProdutos(${i})">Produtos</button>
                <button onclick="deletarCard(${i})">❌</button>
            </div>

            ${item.status=="finalizado"?`
            <textarea id="msg${i}">${item.mensagemEditada}</textarea>
            <button onclick="enviarWhats(document.getElementById('msg${i}').value,'${item.onboarder}')">Whats</button>
            <button onclick="navigator.clipboard.writeText(document.getElementById('msg${i}').value)">Copiar</button>
            `:""}

            ${item.produtosAberto?`
            <div>
                <button onclick="addProduto(${i})">+ Produto</button>

                ${item.produtosLista.map((p,pi)=>{
                    let criado = p.status.toLowerCase().includes("pronto");

                    return `
                    <div class="prodBox ${criado?'criado':''}">
                        <b>${p.nome}</b> (${p.id})
                        ${criado?'<span> ✔</span>':''}

                        <input id="prod_${i}_${pi}"
                        value="${p.status}"
                        oninput="atualizarStatusProduto(${i},${pi})">

                        <button onclick="deletarProduto(${i},${pi})">❌</button>
                    </div>
                    `;
                }).join("")}

            </div>
            `:""}

        </div>
        `;

        if(item.status==="antigo"){
            if(!grupos[item.mes]) grupos[item.mes]={};
            if(!grupos[item.mes][item.data]) grupos[item.mes][item.data]=[];
            grupos[item.mes][item.data].push(card);
        } else {
            document.getElementById(item.status).innerHTML+=card;
        }
    });

    for(let mes in grupos){
        antigo.innerHTML+=`<div class="group">📁 ${mes}</div>`;
        for(let data in grupos[mes]){
            antigo.innerHTML+=`<div class="subgroup">📂 ${data}</div>`;
            grupos[mes][data].forEach(c=>antigo.innerHTML+=c);
        }
    }
}

render();
</script>

</body>
</html>
