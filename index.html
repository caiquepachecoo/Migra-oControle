<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Migração</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #0d0d0f;
    color: #e4e4e7;
    font-size: 13px;
}

.header {
    background: #111;
    padding: 14px;
    text-align: center;
    font-size: 16px;
    border-bottom: 1px solid #222;
}

.container {
    padding: 15px;
    max-width: 1500px;
    margin: auto;
}

input {
    padding: 7px;
    margin: 3px;
    border-radius: 5px;
    border: 1px solid #2a2a2e;
    background: #111;
    color: #fff;
    font-size: 12px;
}

button {
    padding: 4px 7px;
    font-size: 10px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    background: transparent;
    color: #aaa;
}

button:hover {
    background: #1f1f22;
    color: white;
}

button.primary {
    background: #ff6b00;
    color: white;
}

.grid {
    display: flex;
    gap: 8px;
    margin-top: 12px;
}

.coluna {
    flex: 1;
    background: #111;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #222;
    min-height: 350px;
}

.coluna h3 {
    font-size: 12px;
    color: #666;
    margin-bottom: 5px;
}

.card {
    background: #151517;
    padding: 8px;
    border-radius: 6px;
    margin-top: 6px;
    border: 1px solid #222;
    cursor: grab;
}

.card.compacto {
    padding: 4px;
    font-size: 10px;
    opacity: 0.65;
}

.card b {
    font-size: 12px;
}

.card small {
    font-size: 10px;
    color: #777;
}

.actions {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    flex-wrap: wrap;
}

textarea {
    width: 100%;
    margin-top: 4px;
    border-radius: 5px;
    padding: 5px;
    font-size: 11px;
    background: #111;
    border: 1px solid #2a2a2e;
    color: white;
}

a {
    color: #ff6b00;
    font-size: 10px;
}
</style>
</head>

<body>

<div class="header">Controle de Migração</div>

<div class="container">

<input id="id" placeholder="ID">
<input id="cliente" placeholder="Cliente">
<input id="onboarder" placeholder="@Nome ou telefone">
<input id="linkSF" placeholder="Link da Task no SF">

<button class="primary" onclick="add()">Adicionar</button>
<button onclick="limparTudo()">Limpar</button>

<input id="busca" placeholder="Buscar..." oninput="render()">

<div class="grid">
    <div class="coluna" ondragover="allowDrop(event)" ondrop="drop(event,'afazer')">
        <h3>A fazer</h3><div id="afazer"></div>
    </div>

    <div class="coluna" ondragover="allowDrop(event)" ondrop="drop(event,'andamento')">
        <h3>Andamento</h3><div id="andamento"></div>
    </div>

    <div class="coluna" ondragover="allowDrop(event)" ondrop="drop(event,'finalizado')">
        <h3>Finalizado</h3><div id="finalizado"></div>
    </div>

    <div class="coluna" ondragover="allowDrop(event)" ondrop="drop(event,'antigo')">
        <h3>Antigos</h3><div id="antigo"></div>
    </div>
</div>

</div>

<script>
let dados = JSON.parse(localStorage.getItem("migracoes")) || [];
let draggedIndex = null;

function salvar(){
    localStorage.setItem("migracoes", JSON.stringify(dados));
}

function add(){
    if(!id.value || !cliente.value || !onboarder.value || !linkSF.value){
        alert("Preencha tudo");
        return;
    }

    dados.push({
        id: id.value,
        cliente: cliente.value,
        onboarder: onboarder.value,
        linkSF: linkSF.value,
        status: "afazer",
        mensagem:"",
        mensagemEditada:""
    });

    salvar();
    id.value="";
    cliente.value="";
    onboarder.value="";
    linkSF.value="";
    render();
}

function gerarMensagem(item){
    if(!item.mensagem){
        item.mensagem =
`🚨 [Waiting for Conference:
Onboarder: ${item.onboarder}
Descrição: Migração finalizada! Aguardando Conferência.
Link da task no SF: ${item.linkSF}`;

        item.mensagemEditada = item.mensagem;
    }
}

function mover(i,status){
    let item = dados[i];
    item.status = status;

    if(status === "finalizado"){
        gerarMensagem(item);
    }

    salvar();
    render();
}

function arquivar(i){
    dados[i].status = "antigo";
    salvar();
    render();
}

function deletar(i){
    if(confirm("Excluir?")){
        dados.splice(i,1);
        salvar();
        render();
    }
}

function limparTudo(){
    if(confirm("Apagar tudo?")){
        dados=[];
        salvar();
        render();
    }
}

function atualizarMensagem(i){
    dados[i].mensagemEditada = document.getElementById("msgEdit"+i).value;
    salvar();
}

function copiarTexto(texto){
    navigator.clipboard.writeText(texto);
    alert("Copiado!");
}

function enviarWhats(msg, onboarder){
    let numero = onboarder.replace(/\D/g,"");
    let url = numero.length > 8 
        ? `https://wa.me/55${numero}?text=${encodeURIComponent(msg)}`
        : `https://wa.me/?text=${encodeURIComponent(msg)}`;

    window.open(url, "_blank");
}

function drag(event,i){ draggedIndex = i; }
function allowDrop(e){ e.preventDefault(); }

function drop(e,status){
    e.preventDefault();

    if(draggedIndex !== null){
        let item = dados[draggedIndex];

        item.status = status;

        if(status === "finalizado"){
            gerarMensagem(item);
        }

        salvar();
        render();
    }
}

function render(){
    afazer.innerHTML="";
    andamento.innerHTML="";
    finalizado.innerHTML="";
    antigo.innerHTML="";

    let buscaVal = busca.value.toLowerCase();

    dados.forEach((item,i)=>{

        if(item.id.toLowerCase().includes(buscaVal) || item.cliente.toLowerCase().includes(buscaVal)){

            let compacto = item.status=="antigo" ? "compacto" : "";

            let card = `
            <div class="card ${compacto}" draggable="true" ondragstart="drag(event, ${i})">

                <b>${item.cliente}</b><br>
                <small>${item.id}</small>

                ${item.status!="antigo" ? `
                <div class="actions">
                    ${item.status=="afazer" ? `<button onclick="mover(${i},'andamento')">Iniciar</button>`:""}
                    ${item.status!="finalizado" ? `<button onclick="mover(${i},'finalizado')">Finalizar</button>`:""}
                    ${item.status=="finalizado" ? `<button onclick="arquivar(${i})">Arquivar</button>`:""}
                    <button onclick="deletar(${i})">Excluir</button>
                </div>

                ${item.status=="finalizado" ? `
                <textarea id="msgEdit${i}" oninput="atualizarMensagem(${i})">${item.mensagemEditada}</textarea>

                <div class="actions">
                    <button onclick="enviarWhats(document.getElementById('msgEdit${i}').value, '${item.onboarder}')">Whats</button>
                    <button onclick="copiarTexto(document.getElementById('msgEdit${i}').value)">Copiar</button>
                </div>
                `:""}
                `:""}
            </div>
            `;

            document.getElementById(item.status).innerHTML += card;
        }
    });
}

render();
</script>

</body>
</html>
